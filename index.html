<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dailyeye</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />

  <link rel="icon" type="image/x-icon" href="favicon.png" />
</head>
<body>

  <!-- NAV -->
  <nav id="top" aria-label="Main navigation">
    <div class="container main-nav">

      <!-- Logo / Home -->
      <a href="#" class="company-logo" onclick="reload()" aria-label="Reload">
        <img src="logo.png" alt="App logo" />
      </a>

      <!-- Hamburger (mobile) -->
      <button class="menu-icon" aria-label="Open menu" id="menuToggle">☰</button>

      <!-- Links -->
      <div class="nav-links" id="navLinks" aria-hidden="true">
        <ul>
          <li class="nav-item" data-query="Sports">Sports</li>
          <li class="nav-item" data-query="Finance">Finance</li>
          <li class="nav-item" data-query="Technology">Technology</li>
          <li class="nav-item" data-query="Politics">Politics</li>
          <li class="nav-item" data-query="International">International</li>
          <li class="nav-item" data-query="AI">AI</li>
        </ul>
      </div>

      <!-- Search + Login + Dark toggle -->
      <div class="search-bar" id="searchArea">
        <input id="search-text" type="text" class="news-input" placeholder="Search e.g. Climate" aria-label="Search news" />
        <button id="search-button" class="search-button" aria-label="Search">Search</button>
        <button id="toggleDark" class="icon-btn" aria-label="Toggle theme">
          <i class="bi bi-brightness-high-fill"></i>
        </button>
      </div>

    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="container cards-container" id="cards-container" aria-live="polite"></div>
  </main>

  <!-- News card template -->
  <template id="template-news-card">
    <article class="card" role="article">
      <div class="card-header">
        <img src="https://via.placeholder.com/600x360" alt="news image" id="news-img" />
      </div>
      <div class="card-content">
        <h3 id="news-title">Title</h3>
        <h6 class="news-source" id="news-source">Source · Date</h6>
        <p class="news-desc" id="news-desc">Description...</p>
      </div>
    </article>
  </template>

  <!-- Back to top -->
  <button onclick="topFunction()" id="btn" title="Back to top" aria-label="Back to top">↑</button>

  <!-- Script -->
  <script src="script.js"></script>

  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-analytics.com/v1/script.js"></script>
</body>
</html>
